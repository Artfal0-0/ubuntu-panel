<!doctype html>
<html lang="es">
  <head>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1a0b14" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Panel de Control</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&family=Ubuntu+Mono&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        --ubuntu-orange: #e95420;
        --ubuntu-orange-dark: #c7461a;
        --ubuntu-purple: #77216f;
        --bg: #1a0b14;
        --surface: #2c1124;
        --surface2: #3a1830;
        --text: #f2efee;
        --text-muted: #aea79f;
        --green: #1db954;
        --border: rgba(233, 84, 32, 0.15);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Ubuntu", sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100dvh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        padding: 10px 16px;
        background: rgba(26, 11, 20, 0.9);
        border-bottom: 1px solid var(--border);
      }
      .topbar-title {
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
      }
      .time-display {
        font-family: "Ubuntu Mono", monospace;
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      .main-content {
        flex: 1;
        overflow: hidden;
        position: relative;
      }

      .tab {
        display: none;
        height: 100%;
        overflow-y: auto;
        padding: 15px;
        padding-bottom: 80px;
        flex-direction: column;
        gap: 15px;
      }
      .tab.active {
        display: flex;
        animation: fadeIn 0.2s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .bottom-nav {
        position: fixed;
        bottom: 0;
        width: 100%;
        display: flex;
        background: rgba(44, 17, 36, 0.95);
        backdrop-filter: blur(10px);
        border-top: 1px solid var(--border);
        padding-bottom: env(safe-area-inset-bottom);
      }
      .nav-btn {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--text-muted);
        padding: 12px 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        font-size: 0.65rem;
        cursor: pointer;
        transition: 0.2s;
        font-family: "Ubuntu", sans-serif;
      }
      .nav-btn i {
        font-size: 1.2rem;
      }
      .nav-btn.active {
        color: var(--ubuntu-orange);
      }

      .section-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 8px;
        display: block;
      }
      .apps-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .btn-app {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 12px;
        padding: 12px 5px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        transition: 0.1s;
      }
      .btn-app:active {
        transform: scale(0.95);
        border-color: var(--ubuntu-orange);
      }
      .app-emoji {
        font-size: 1.6rem;
      }
      .app-label {
        font-size: 0.6rem;
        text-align: center;
      }

      .btn-web {
        background: linear-gradient(
          135deg,
          rgba(119, 33, 111, 0.6),
          rgba(94, 39, 80, 0.8)
        );
        border-color: var(--ubuntu-purple);
      }
      .btn-web:hover {
        background: linear-gradient(
          135deg,
          rgba(119, 33, 111, 0.8),
          rgba(94, 39, 80, 1)
        );
      }

      .album-art {
        width: 100%;
        aspect-ratio: 1;
        background: var(--surface2);
        border-radius: 12px;
        border: 1px solid var(--border);
        object-fit: cover;
        margin-bottom: 10px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      }
      .track-info {
        text-align: center;
        margin-bottom: 15px;
        overflow: hidden;
      }
      .track-title {
        font-size: 1.3rem;
        color: var(--text);
        font-weight: bold;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 3px;
      }
      .track-artist {
        font-size: 0.9rem;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .music-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding: 0 10px;
      }
      .btn-music {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: white;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        font-size: 1.2rem;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: 0.15s;
      }
      .btn-music.play {
        width: 65px;
        height: 65px;
        font-size: 1.5rem;
        background: var(--green);
        color: black;
        border: none;
      }
      .btn-music:active {
        transform: scale(0.9);
      }

      .btn-extra {
        background: transparent;
        border: none;
        color: var(--text-muted);
        font-size: 1.2rem;
        cursor: pointer;
        transition: 0.2s;
        padding: 10px;
      }
      .btn-extra.active {
        color: var(--green);
      }
      .btn-extra.active-track {
        color: var(--ubuntu-orange);
      }

      .progress-container {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.7rem;
        color: var(--text-muted);
        margin-bottom: 20px;
      }
      input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        border-radius: 2px;
        background: var(--surface2);
        outline: none;
        touch-action: none; 
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--ubuntu-orange);
        cursor: pointer;
      }
      .range-green::-webkit-slider-thumb {
        background: var(--green) !important;
      }

      .vol-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 15px;
      }
      .vol-label {
        font-size: 0.8rem;
        color: var(--text-muted);
        width: 20px;
        text-align: center;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 15px;
      }
      .clip-input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        color: white;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 10px;
        font-family: inherit;
        resize: none;
      }
      .btn-action {
        width: 100%;
        background: var(--ubuntu-orange);
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 0.9rem;
        transition: 0.2s;
      }
      .btn-action:active {
        transform: scale(0.97);
      }
      .btn-action.outline {
        background: transparent;
        border: 1px solid var(--ubuntu-orange);
        color: var(--ubuntu-orange);
      }
      .file-dropzone {
        border: 2px dashed var(--border);
        border-radius: 8px;
        padding: 30px 10px;
        text-align: center;
        background: var(--surface2);
      }

      .toast {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-100px);
        background: var(--surface);
        border: 1px solid var(--ubuntu-orange);
        border-radius: 20px;
        padding: 8px 20px;
        font-size: 0.8rem;
        color: var(--ubuntu-orange);
        transition: 0.3s;
        z-index: 100;
        white-space: nowrap;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-left">
        <i class="fa-brands fa-ubuntu" style="color: var(--ubuntu-orange)"></i>
        <span class="topbar-title">PC Control</span>
      </div>
      <div class="time-display" id="clock">--:--</div>
    </div>

    <div class="main-content">
      <div id="tab-apps" class="tab active">
        <span class="section-label">Web & Accesos Rápidos</span>
        <div class="apps-grid" style="margin-bottom: 15px">
          <button class="btn-app btn-web" onclick="action('/api/apps/github')">
            <i class="fa-brands fa-github app-emoji"></i
            ><span class="app-label">GitHub</span>
          </button>
          <button
            class="btn-app btn-web"
            onclick="action('/api/apps/whatsapp')"
          >
            <i class="fa-brands fa-whatsapp app-emoji"></i
            ><span class="app-label">WhatsApp</span>
          </button>
          <button class="btn-app btn-web" onclick="action('/api/apps/gemini')">
            <i class="fa-solid fa-robot app-emoji"></i
            ><span class="app-label">Gemini</span>
          </button>
        </div>

        <span class="section-label">Sistema y Herramientas</span>
        <div class="apps-grid">
          <button class="btn-app" onclick="action('/api/apps/terminal')">
            <i class="fa-solid fa-terminal app-emoji"></i
            ><span class="app-label">Terminal</span>
          </button>
          <button class="btn-app" onclick="action('/api/apps/navegador')">
            <i class="fa-brands fa-firefox-browser app-emoji"></i
            ><span class="app-label">Navegador</span>
          </button>
          <button class="btn-app" onclick="action('/api/apps/archivos')">
            <i class="fa-solid fa-folder app-emoji"></i
            ><span class="app-label">Archivos</span>
          </button>
          <button class="btn-app" onclick="action('/api/apps/vscode')">
            <i class="fa-solid fa-code app-emoji"></i
            ><span class="app-label">VS Code</span>
          </button>
          <button class="btn-app" onclick="action('/api/apps/onlyoffice')">
            <i class="fa-solid fa-file-excel app-emoji"></i
            ><span class="app-label">Only Office</span>
          </button>
          <button class="btn-app" onclick="action('/api/apps/calculadora')">
            <i class="fa-solid fa-calculator app-emoji"></i
            ><span class="app-label">Calculadora</span>
          </button>
          <button class="btn-app" onclick="action('/api/apps/monitor')">
            <i class="fa-solid fa-heart-pulse app-emoji"></i
            ><span class="app-label">Monitor</span>
          </button>
          <button class="btn-app" onclick="action('/api/apps/captura')">
            <i class="fa-solid fa-camera app-emoji"></i
            ><span class="app-label">Captura</span>
          </button>
          <button class="btn-app" onclick="action('/api/apps/discord')">
            <i class="fa-brands fa-discord app-emoji"></i
            ><span class="app-label">Discord</span>
          </button>
          <button class="btn-app" onclick="action('/api/apps/antigravity')">
            <i class="fa-solid fa-brain app-emoji"></i
            ><span class="app-label">Antigravity</span>
          </button>
          <button class="btn-app" onclick="action('/api/apps/spotify')">
            <i class="fa-brands fa-spotify app-emoji"></i
            ><span class="app-label">Spotify</span>
          </button>
          <button
            class="btn-app"
            onclick="action('/api/system/lock')"
            style="border-color: var(--ubuntu-orange)"
          >
            <i
              class="fa-solid fa-lock app-emoji"
              style="color: var(--ubuntu-orange)"
            ></i
            ><span class="app-label">Bloquear</span>
          </button>
        </div>
      </div>

      <div id="tab-music" class="tab">
        <img
          id="album-art"
          class="album-art"
          src=""
          onerror="
            this.src =
              'data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100%\' height=\'100%\' viewBox=\'0 0 100 100\'><rect width=\'100\' height=\'100\' fill=\'%233a1830\'/><text x=\'50\' y=\'50\' fill=\'%23aea79f\' font-size=\'10\' text-anchor=\'middle\' dy=\'.3em\'>Sin Música</text></svg>'
          "
        />

        <div class="track-info">
          <div class="track-title" id="track-title">Nada sonando</div>
          <div class="track-artist" id="track-artist">Desconocido</div>
        </div>

        <div class="progress-container">
          <span id="time-current">0:00</span>
          <input
            type="range"
            id="track-slider"
            class="range-green"
            min="1"
            max="100"
            value="1"
          />
          <span id="time-total">0:00</span>
        </div>

        <div class="music-controls">
          <button
            class="btn-extra"
            id="btn-shuffle"
            onclick="action('/api/spotify/shuffle')"
          >
            <i class="fa-solid fa-shuffle"></i>
          </button>

          <div style="display: flex; gap: 15px; align-items: center">
            <button class="btn-music" onclick="action('/api/spotify/prev')">
              <i class="fa-solid fa-backward-step"></i>
            </button>
            <button
              class="btn-music play"
              onclick="action('/api/spotify/playpause')"
            >
              <i class="fa-solid fa-play"></i>
            </button>
            <button class="btn-music" onclick="action('/api/spotify/next')">
              <i class="fa-solid fa-forward-step"></i>
            </button>
          </div>

          <button
            class="btn-extra"
            id="btn-repeat"
            onclick="action('/api/spotify/repeat')"
          >
            <i class="fa-solid fa-repeat"></i>
          </button>
        </div>

        <div class="card" style="margin-top: 10px">
          <div class="vol-row">
            <span class="vol-label"
              ><i class="fa-solid fa-volume-low"></i
            ></span>
            <input
              type="range"
              min="0"
              max="100"
              value="10"
              oninput="fetch('/api/system/volume/' + this.value)"
            />
            <span class="vol-label"
              ><i class="fa-solid fa-volume-high"></i
            ></span>
          </div>
          <div class="vol-row" style="margin-bottom: 0">
            <span class="vol-label"><i class="fa-regular fa-sun"></i></span>
            <input
              type="range"
              min="1"
              max="100"
              value="1"
              oninput="fetch('/api/system/brightness/' + this.value)"
            />
            <span class="vol-label"><i class="fa-solid fa-sun"></i></span>
          </div>
        </div>
      </div>

      <div id="tab-transfer" class="tab">
        <span class="section-label">Enviar a PC</span>
        <div class="card">
          <textarea
            id="clip-send"
            class="clip-input"
            rows="2"
            placeholder="Escribe o pega algo aquí..."
          ></textarea>
          <button class="btn-action" onclick="sendToPc()">
            <i class="fa-solid fa-arrow-up-from-bracket"></i> Copiar en PC
          </button>
        </div>

        <span class="section-label">Recibir de PC</span>
        <div class="card">
          <textarea
            id="clip-receive"
            class="clip-input"
            rows="3"
            readonly
            placeholder="El portapapeles de tu computadora aparecerá aquí..."
          ></textarea>
          <div style="display: flex; gap: 10px">
            <button class="btn-action outline" onclick="getFromPc()">
              <i class="fa-solid fa-arrows-rotate"></i> Actualizar
            </button>
            <button class="btn-action" onclick="copyToPhone()">
              <i class="fa-solid fa-copy"></i> Copiar
            </button>
          </div>
        </div>

        <span class="section-label">Enviar Archivo a Descargas</span>
        <div class="card">
          <div
            class="file-dropzone"
            onclick="document.getElementById('file-upload').click()"
          >
            <i
              class="fa-solid fa-cloud-arrow-up"
              style="
                font-size: 2.5rem;
                color: var(--ubuntu-orange);
                margin-bottom: 10px;
              "
            ></i>
            <p style="color: var(--text-muted); font-size: 0.9rem">
              Toca para elegir un archivo
            </p>
            <p
              id="upload-status"
              style="color: var(--green); margin-top: 5px; font-weight: bold"
            ></p>
          </div>
          <input
            type="file"
            id="file-upload"
            style="display: none"
            onchange="uploadFile(this)"
          />
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <button
        class="nav-btn active"
        id="btn-tab-apps"
        onclick="switchTab('tab-apps')"
      >
        <i class="fa-solid fa-layer-group"></i> Apps
      </button>
      <button
        class="nav-btn"
        id="btn-tab-music"
        onclick="switchTab('tab-music')"
      >
        <i class="fa-brands fa-spotify"></i> Media
      </button>
      <button
        class="nav-btn"
        id="btn-tab-transfer"
        onclick="switchTab('tab-transfer')"
      >
        <i class="fa-solid fa-right-left"></i> Transfer
      </button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      function switchTab(tabId) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".nav-btn")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        document.getElementById("btn-" + tabId).classList.add("active");
        if (tabId === "tab-transfer") getFromPc();
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2000);
      }

      function action(endpoint) {
        fetch(endpoint)
          .then((r) => r.json())
          .catch(() => showToast("Error de red"));
        if (endpoint.includes("spotify")) setTimeout(updateSpotify, 500);
      }

      function sendToPc() {
        const txt = document.getElementById("clip-send").value;
        if (!txt) return;
        fetch("/api/clipboard", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ texto: txt }),
        }).then(() => {
          showToast("Copiado en la PC");
          document.getElementById("clip-send").value = "";
        });
      }

      function getFromPc() {
        fetch("/api/clipboard")
          .then((r) => r.json())
          .then((data) => {
            if (data.status === "ok")
              document.getElementById("clip-receive").value = data.texto;
          });
      }

      function copyToPhone() {
        const copyText = document.getElementById("clip-receive");
        copyText.select();
        copyText.setSelectionRange(0, 99999);
        try {
          document.execCommand("copy");
          showToast("Copiado al celular");
        } catch (e) {
          showToast("Error al copiar");
        }
      }

      function uploadFile(inputElement) {
        const file = inputElement.files[0];
        if (!file) return;
        const statusText = document.getElementById("upload-status");
        statusText.textContent = "Subiendo...";
        statusText.style.color = "var(--ubuntu-orange)";
        const formData = new FormData();
        formData.append("file", file);
        fetch("/api/upload", { method: "POST", body: formData })
          .then((r) => r.json())
          .then((data) => {
            statusText.textContent = "¡Enviado!";
            statusText.style.color = "var(--green)";
            showToast("Archivo en Descargas");
            inputElement.value = "";
          })
          .catch(() => (statusText.textContent = "Error de red"));
      }

      let isDraggingSlider = false;
      const slider = document.getElementById("track-slider");

      slider.addEventListener(
        "touchstart",
        () => {
          isDraggingSlider = true;
        },
        { passive: true },
      );
      slider.addEventListener("mousedown", () => {
        isDraggingSlider = true;
      });
      slider.addEventListener("input", () => {
        document.getElementById("time-current").textContent = formatTime(
          slider.value,
        );
      });

      function endDrag() {
        if (!isDraggingSlider) return;
        fetch("/api/spotify/seek/" + slider.value).then(() => {
          setTimeout(() => {
            isDraggingSlider = false;
            updateSpotify();
          }, 200);
        });
      }
      slider.addEventListener("touchend", endDrag);
      slider.addEventListener("mouseup", endDrag);

      function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s < 10 ? "0" : ""}${s}`;
      }

      function updateSpotify() {
        fetch("/api/spotify/current")
          .then((r) => r.json())
          .then((data) => {
            const titleEl = document.getElementById("track-title");
            const artistEl = document.getElementById("track-artist");

            if (titleEl) titleEl.textContent = data.title || "Nada sonando";
            if (artistEl) artistEl.textContent = data.artist || "";

            const btnShuff = document.getElementById("btn-shuffle");
            const btnRep = document.getElementById("btn-repeat");

            if (btnShuff) {
              if (data.shuffle === "On") btnShuff.classList.add("active");
              else btnShuff.classList.remove("active");
            }

            if (btnRep) {
              if (data.loop === "Playlist") {
                btnRep.classList.add("active");
                btnRep.classList.remove("active-track");
              } else if (data.loop === "Track") {
                btnRep.classList.add("active-track");
                btnRep.classList.remove("active");
              } else {
                btnRep.classList.remove("active");
                btnRep.classList.remove("active-track");
              }
            }

            if (!isDraggingSlider) {
              if (slider) {
                slider.max = data.length || 100;
                slider.value = data.pos || 0;
              }
              const currentEl = document.getElementById("time-current");
              const totalEl = document.getElementById("time-total");
              if (currentEl) currentEl.textContent = formatTime(data.pos || 0);
              if (totalEl) totalEl.textContent = formatTime(data.length || 0);
            }

            const artEl = document.getElementById("album-art");
            if (
              artEl &&
              (!artEl.src.includes("/api/spotify/art") || Math.random() < 0.1)
            ) {
              artEl.src = "/api/spotify/art?t=" + new Date().getTime();
            }
          })
          .catch(() => {});
      }

      setInterval(updateSpotify, 2000);
      updateSpotify();
      setInterval(() => {
        const now = new Date();
        document.getElementById("clock").textContent =
          now.getHours().toString().padStart(2, "0") +
          ":" +
          now.getMinutes().toString().padStart(2, "0");
      }, 10000);
    </script>
  </body>
</html>
